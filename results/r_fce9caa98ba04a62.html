<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueVitals Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080a; --bg2:#0d0d10; --surface:#131316; --surface2:#1a1a1e; --surface3:#212127;
  --border:#242429; --border2:#33333a;
  --text:#f7f7f8; --text2:#a5a5ae; --text3:#6e6e78;
  --green:#2ce4ad; --green-soft:rgba(44,228,173,.12); --green-mid:rgba(44,228,173,.28);
  --red:#ff5a5f; --red-soft:rgba(255,90,95,.12); --red-mid:rgba(255,90,95,.3);
  --amber:#e8c15a; --amber-soft:rgba(232,193,90,.12); --amber-mid:rgba(232,193,90,.3);
  --blue:#7c9bff; --blue-soft:rgba(124,155,255,.12);
  --silh-top:#17171c; --silh-bot:#101014; --silh-stroke:#2a2a31;
  --shadow:0 1px 0 rgba(255,255,255,.02), 0 10px 30px -12px rgba(0,0,0,.6);
  --r:16px; --r-sm:11px;
}
body[data-theme="light"]{
  --bg:#f6f7f9; --bg2:#eef0f4; --surface:#ffffff; --surface2:#f4f5f8; --surface3:#eceef2;
  --border:#e3e6ec; --border2:#d3d7df;
  --text:#14161c; --text2:#565b66; --text3:#8b909b;
  --green:#0fb488; --green-soft:rgba(15,180,136,.12); --green-mid:rgba(15,180,136,.28);
  --red:#e23d43; --red-soft:rgba(226,61,67,.1); --red-mid:rgba(226,61,67,.28);
  --amber:#c79514; --amber-soft:rgba(199,149,20,.12); --amber-mid:rgba(199,149,20,.3);
  --blue:#4864d8; --blue-soft:rgba(72,100,216,.1);
  --silh-top:#e9ecf1; --silh-bot:#dfe3ea; --silh-stroke:#cfd4dd;
  --shadow:0 1px 2px rgba(20,22,28,.04), 0 12px 30px -16px rgba(20,22,28,.18);
}
html{scroll-behavior:smooth;background:var(--bg)}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1200px 600px at 80% -10%, rgba(44,228,173,.05), transparent 60%),radial-gradient(900px 500px at 0% 10%, rgba(124,155,255,.04), transparent 55%);}
.c-green{color:var(--green)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
a{color:var(--green)}
.hide{display:none!important}

/* ---------- NAV ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:80;height:64px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;
  background:color-mix(in srgb,var(--bg) 78%, transparent);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.nav-brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand{font-size:19px;font-weight:700;letter-spacing:-.4px}.brand span{color:var(--green)}
.gate-logo-img{display:block;width:180px;height:auto;margin:0 auto 14px}
.logo-dark,.logo-light{height:26px;width:auto;display:block}
.logo-light{display:none}
body[data-theme="light"] .logo-dark{display:none}
body[data-theme="light"] .logo-light{display:block}
.logo-print{height:30px;width:auto}
.foot-logo{height:24px;width:auto;margin:0 auto 12px;display:block}
body[data-theme="light"] .foot-logo.inv{display:none}
body[data-theme="light"] .foot-logo.std{display:block}
.foot-logo.std{display:none}
.nav-patient{font-size:12.5px;color:var(--text3);padding-left:14px;border-left:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--text3);text-decoration:none;font-size:13px;font-weight:500;padding:8px 13px;border-radius:9px;transition:.18s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--green);background:var(--green-soft)}
.nav-actions{display:flex;align-items:center;gap:8px}
.iconbtn{display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text2);background:transparent;border:1px solid var(--border2);border-radius:9px;padding:8px 12px;cursor:pointer;transition:.18s}
.iconbtn:hover{color:var(--text);border-color:var(--green);background:var(--green-soft)}
.iconbtn svg{width:15px;height:15px}
.iconbtn.primary{color:var(--green);border-color:var(--green-mid)}

/* ---------- MOBILE NAV ---------- */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:80;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0));
  background:color-mix(in srgb,var(--bg) 88%, transparent);backdrop-filter:blur(22px);border-top:1px solid var(--border)}
.mnav-in{display:flex;justify-content:space-around}
.mnav a{flex:1;color:var(--text3);text-decoration:none;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px}
.mnav a.active{color:var(--green)}
.mnav svg{width:20px;height:20px}

/* ---------- LAYOUT ---------- */
.wrap{max-width:940px;margin:0 auto;padding:92px 22px 120px}
section{margin-bottom:60px;opacity:1}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--green);margin-bottom:12px}
.sec-title{font-size:clamp(22px,3.4vw,30px);font-weight:700;letter-spacing:-.6px;margin-bottom:6px}
.sec-sub{color:var(--text2);font-size:15px;margin-bottom:26px;max-width:560px}

/* ---------- HERO ---------- */
.hero{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;
  background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:24px;padding:40px 40px;box-shadow:var(--shadow)}
.hero-name{font-size:clamp(34px,6vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1;display:flex;flex-direction:column;gap:10px;margin:6px 0 14px}
.hero-name-sub{font-size:15px;font-weight:500;letter-spacing:0;color:var(--text2)}
.hero-lede{color:var(--text2);font-size:15.5px;max-width:420px;margin-bottom:26px}
.hero-stats{display:flex;gap:26px;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column}
.hstat-n{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.hstat-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-top:4px}
.hero-ring{position:relative;width:220px;height:220px;flex-shrink:0}
.ring-svg{width:100%;height:100%;overflow:visible}
.ring-track{fill:none;stroke:var(--surface3);stroke-width:12}
.ring-track2{fill:none;stroke:var(--surface2);stroke-width:6}
.ring-fill{fill:none;stroke:var(--green);stroke-width:12;stroke-linecap:round;filter:drop-shadow(0 0 8px var(--green-mid))}
.ring-fill2{fill:none;stroke:var(--red);stroke-width:6;stroke-linecap:round;opacity:.85}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.ring-pct span{font-size:22px;font-weight:600;color:var(--text2);margin-left:2px}
.ring-cap{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:6px}

/* ---------- ALERT ---------- */
.alert{display:flex;align-items:center;gap:16px;background:linear-gradient(120deg,var(--red-soft),transparent);border:1px solid var(--red-mid);border-radius:16px;padding:16px 18px;margin-bottom:28px;position:relative;overflow:hidden}
.alert::before{content:"";position:absolute;inset:0;border-radius:16px;border:1px solid var(--red);opacity:0;animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0}50%{opacity:.5}}
.alert-ic{flex-shrink:0;width:40px;height:40px;border-radius:11px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center}
.alert-ic svg{width:22px;height:22px}
.alert-body{flex:1;min-width:0}
.alert-title{font-weight:600;font-size:15px;margin-bottom:2px}
.alert-text{font-size:13px;color:var(--text2)}
.alert-btn{flex-shrink:0;font-family:inherit;font-weight:600;font-size:13px;color:var(--red);background:var(--red-soft);border:1px solid var(--red-mid);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.18s}
.alert-btn:hover{background:var(--red);color:#fff}

/* ---------- BODY MAP ---------- */
.bodywrap{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:22px;padding:20px;box-shadow:var(--shadow)}
.bodysvg{width:100%;max-width:520px;height:auto;display:block;margin:0 auto}
.silhouette{opacity:.9}
.leader{stroke:var(--border2);stroke-width:1;stroke-dasharray:3 4;opacity:.7}
.node{cursor:pointer;opacity:0;transform:scale(.4);transform-box:fill-box;transform-origin:center;transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1)}
.node.on{opacity:1;transform:scale(1)}
.node-halo{fill:transparent;opacity:.16}
.node-dot{stroke:var(--bg);stroke-width:2}
.node-ic{color:#06110d;opacity:.85}
.node-green .node-dot{fill:var(--green)} .node-green .node-halo{fill:var(--green);animation:halo 3s ease-in-out infinite}
.node-amber .node-dot{fill:var(--amber)} .node-amber .node-halo{fill:var(--amber);animation:halo 3s ease-in-out infinite}
.node-red .node-dot{fill:var(--red)} .node-red .node-halo{fill:var(--red);animation:haloRed 1.8s ease-in-out infinite}
.node-red .node-ic,.node-amber .node-ic{color:#120c02}
body[data-theme="light"] .node-ic{color:#fff}
@keyframes halo{0%,100%{opacity:.14;r:18}50%{opacity:.26;r:22}}
@keyframes haloRed{0%,100%{opacity:.2}50%{opacity:.4}}
.node:hover .node-dot,.node:focus .node-dot{filter:brightness(1.15)}
.node:focus{outline:none}
.node:focus .node-halo{opacity:.4}
.scan rect{fill:var(--green);opacity:0}
.scan.run rect{animation:scan 1.5s cubic-bezier(.4,0,.2,1) 1}
@keyframes scan{0%{opacity:0;transform:translateY(70px)}10%{opacity:.5}90%{opacity:.5}100%{opacity:0;transform:translateY(330px)}}
.scan{transform-box:view-box}
.bodytip{position:fixed;z-index:200;transform:translate(-50%,-100%);background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:var(--shadow);white-space:nowrap}
.bodytip.show{opacity:1}
.bodytip strong{display:block;font-size:12.5px;margin-bottom:1px}
.tip-red{color:var(--red)}
.mpills{display:none;gap:8px;overflow-x:auto;padding:14px 2px 4px;-webkit-overflow-scrolling:touch}
.mpill{flex-shrink:0;display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 13px;cursor:pointer;white-space:nowrap}
.mpill-dot{width:8px;height:8px;border-radius:50%}
.mpill-green .mpill-dot{background:var(--green)}.mpill-amber .mpill-dot{background:var(--amber)}.mpill-red .mpill-dot{background:var(--red)}

/* ---------- SYSTEM GRID ---------- */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.scard{display:flex;align-items:center;gap:13px;text-align:left;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.scard:hover{transform:translateY(-2px);border-color:var(--border2)}
.scard-ic{flex-shrink:0;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
.scard-ic svg{width:20px;height:20px;color:var(--text2)}
.scard-green .scard-ic{background:var(--green-soft)}.scard-green .scard-ic svg{color:var(--green)}
.scard-amber .scard-ic{background:var(--amber-soft)}.scard-amber .scard-ic svg{color:var(--amber)}
.scard-red .scard-ic{background:var(--red-soft)}.scard-red .scard-ic svg{color:var(--red)}
.scard-body{flex:1;min-width:0}
.scard-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.scard-meta{font-size:12px;color:var(--text3)}
.scard-badge{flex-shrink:0;font-size:10.5px;font-weight:600;padding:4px 8px;border-radius:7px;text-align:center}
.sb-green{background:var(--green-soft);color:var(--green)}.sb-amber{background:var(--amber-soft);color:var(--amber)}.sb-red{background:var(--red-soft);color:var(--red)}

/* ---------- TOP FINDINGS ---------- */
.finds{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.find{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);border-left:3px solid var(--border2)}
.find-red{border-left-color:var(--red)}.find-green{border-left-color:var(--green)}.find-amber{border-left-color:var(--amber)}
.find-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.find-name{font-size:14px;font-weight:600}
.find-val{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-top:2px}
.find-val span{font-size:13px;font-weight:500;color:var(--text3)}
.find-desc{font-size:13px;color:var(--text2);margin-top:12px;line-height:1.6}

/* ---------- ANALYSIS CARDS ---------- */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 26px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;border-left:3px solid var(--border2)}
.acard-green{border-left-color:var(--green)}.acard-red{border-left-color:var(--red)}.acard-blue{border-left-color:var(--blue)}
.acard-h{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;margin-bottom:14px}
.acard-dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-blue{background:var(--blue)}
.acard-c{font-size:14.5px;color:var(--text2);line-height:1.85;white-space:pre-line}
.lead-warn{font-size:15px;font-weight:500;color:var(--text);line-height:1.7;padding:14px 16px;margin-bottom:16px;background:var(--red-soft);border-left:3px solid var(--red);border-radius:0 10px 10px 0;white-space:pre-line}
.numbered{padding-left:74px}
.num{position:absolute;left:22px;top:22px;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.num-red{background:var(--red-soft);color:var(--red)}.num-blue{background:var(--blue-soft);color:var(--blue)}

/* ---------- CONTROLS ---------- */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.search{flex:1;min-width:200px;max-width:300px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 15px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.18s}
.search:focus{border-color:var(--green)}
.search::placeholder{color:var(--text3)}
.fbtn{font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 16px;cursor:pointer;transition:.18s}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.active{color:var(--green);background:var(--green-soft);border-color:var(--green-mid)}

/* ---------- GROUPS ---------- */
.grp{margin-bottom:12px;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
.grp-flash{box-shadow:0 0 0 2px var(--green-mid)}
.grp-h{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;cursor:pointer;user-select:none;transition:.18s}
.grp-h:hover{background:var(--surface2)}
.grp-name{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.7px}
.grp-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
.grp-flag{color:var(--red);font-weight:600}
.chev{transition:transform .3s;color:var(--text3)}
.grp.open .chev{transform:rotate(180deg)}
.grp-body{display:none;padding:6px 12px 14px}
.grp.open .grp-body{display:block}

/* ---------- BIOMARKER CARD ---------- */
.bc{border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--bg2);transition:border-color .18s}
.bc:hover{border-color:var(--border2)}
.bc-red{background:linear-gradient(90deg,var(--red-soft),transparent 55%)}
.bc-green{background:linear-gradient(90deg,var(--green-soft),transparent 55%)}
.bc-amber{background:linear-gradient(90deg,var(--amber-soft),transparent 55%)}
.bc-main{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer}
.bc-tick{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tick-red{background:var(--red)}.tick-green{background:var(--green)}.tick-amber{background:var(--amber)}.tick-blue{background:var(--blue)}
.bc-info{flex:1;min-width:110px}
.bc-name{font-size:14px;font-weight:500}
.bc-res{font-size:13px;color:var(--text2)}
.chip{flex-shrink:0;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.chip-flag{background:var(--red-soft);color:var(--red)}.chip-optimal{background:var(--green-soft);color:var(--green)}
.chip-range{background:var(--amber-soft);color:var(--amber)}.chip-qual{background:var(--blue-soft);color:var(--blue)}
.bc-chev{color:var(--text3);transition:transform .3s;flex-shrink:0}
.bc.open .bc-chev{transform:rotate(180deg)}
.bc-detail{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.bc-detail-in{padding:2px 16px 18px 39px;border-top:1px solid var(--border)}
.bc-desc{font-size:13.5px;color:var(--text2);line-height:1.7;padding-top:14px;margin-bottom:14px}
.bc-desc strong{color:var(--text);font-weight:600}
.bc-ranges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.bc-ranges span{font-size:11.5px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;gap:1px}
.bc-ranges em{font-style:normal;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.bc-causes{font-size:12.5px;color:var(--text3);line-height:1.6}
.bc-causes em{font-style:normal;color:var(--text2);font-weight:600}

/* ---------- RANGE BAR ---------- */
.rbar-wrap{flex:1;max-width:240px;min-width:130px}
.rbar-big{max-width:none;margin:4px 0 2px}
.rbar{position:relative;height:10px;border-radius:6px;overflow:visible;
  background:linear-gradient(90deg,var(--red-mid),var(--amber-mid) 35%,var(--amber-mid) 65%,var(--red-mid))}
.rbar-normal{position:absolute;top:0;height:100%;background:var(--amber-soft);border-radius:6px}
.rbar-opt{position:absolute;top:0;height:100%;background:var(--green-mid);border-radius:6px;box-shadow:inset 0 0 0 1px var(--green-soft)}
.rbar-dot{position:absolute;top:50%;left:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);border:2.5px solid var(--bg2);transition:left 1s cubic-bezier(.34,1.3,.5,1)}
.rbar-dot.dot-red{background:var(--red);box-shadow:0 0 10px var(--red-mid)}
.rbar-dot.dot-green{background:var(--green);box-shadow:0 0 10px var(--green-mid)}
.rbar-dot.dot-amber{background:var(--amber);box-shadow:0 0 10px var(--amber-mid)}

/* ---------- FOOTER ---------- */
.foot{text-align:center;padding:44px 22px;border-top:1px solid var(--border);margin-top:40px}
/* foot-brand replaced by .foot-logo img */
.foot p{font-size:12px;color:var(--text3);margin-bottom:5px}

/* ---------- GATE ---------- */
.gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);
  background-image:radial-gradient(700px 500px at 50% 30%, rgba(44,228,173,.1), transparent 60%);transition:opacity .5s,transform .5s}
.gate-out{opacity:0;transform:scale(1.04);pointer-events:none}
.gate-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:46px 40px;max-width:410px;width:90%;text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.7);overflow:hidden}
.gate-card>*{position:relative}
@keyframes spin{to{transform:rotate(360deg)}}
/* gate-logo replaced by .gate-logo-img */
.gate-sub{color:var(--text2);font-size:14px;margin-bottom:28px;line-height:1.55}
.gate-label{display:block;text-align:left;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:8px}

ncy","high_causes":"Dehydration","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"rdw","name":"RDW","group":"HEMATOLOGY","result":"14.4","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.7222","lower_normal":"11.6","upper_normal":"14","lower_optimal":"12","upper_optimal":"13.5","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3888888889","upper_optimal_position":"0.5972222222","units":"%","description":"Above range at 14.4 (limit 14). The red blood cells are varying in size more than normal. With the transferrin saturation at 14.56% (below range) and iron at 9.4 (at the floor of range), the iron supply to the bone marrow is insufficient despite adequate stores (ferritin 82). The body has iron in reserve but is not mobilising it quickly enough to keep up with the extreme training demand. The RDW reflects this mismatch: some cells are being produced with adequate iron, others with less","low_causes":"Iron transport insufficiency, exercise demand","high_causes":"Nutritional stress","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"plateletcount","name":"Platelet Count","group":"HEMATOLOGY","result":"210","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4103","lower_normal":"150","upper_normal":"410","lower_optimal":"200","upper_optimal":"350","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3974358974","upper_optimal_position":"0.5897435897","units":"x 10^9/L","description":"Within optimal","low_causes":"Bone marrow disorders","high_causes":"Inflammation","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"mpv","name":"MPV","group":"HEMATOLOGY","result":"9.9","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.6444","lower_normal":"7.1","upper_normal":"10.1","lower_optimal":"8","upper_optimal":"10","lower_normal_position":"0.3333333333","upper_normal_position":"0.66 eticulocyte absolute 29.28), suggesting a broader pattern of marrow suppression from the training demands. This should be discussed with a GP, who may wish to repeat the full blood count after a period of reduced training to determine whether the neutropenia resolves. If it persists at rest, further investigation would be warranted","low_causes":"Intense exercise, chronic overtraining, bone marrow suppression","high_causes":"Bacterial infections","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"lymphocytecount","name":"Lymphocyte Count","group":"HEMATOLOGY","result":"1.55","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.425","lower_normal":"1","upper_normal":"3","lower_optimal":"1.5","upper_optimal":"2.5","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4166666667","upper_optimal_position":"0.5833333333","units":"x 10^9/L","description":"Within optimal","low_causes":"Immunodeficiency","high_causes":"Viral infections","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"monocytecount","name":"Monocyte Count","group":"HEMATOLOGY","result":"0.25","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.3542","lower_normal":"0.2","upper_normal":"1","lower_optimal":"0.3","upper_optimal":"0.7","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.375","upper_optimal_position":"0.5416666667","units":"x 10^9/L","description":"Within range","low_causes":"Bone marrow suppression","high_causes":"Chronic infections","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"eosinophilcount","name":"Eosinophil Count","group":"HEMATOLOGY","result":"0.2","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4583","lower_normal":"0.02","upper_normal":"0.5","lower_optimal":"0.1","upper_optimal":"0.3","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3888888889","upper_optimal_position":"0.5277777778","units":"x 10^9/L","description":"Within range","low_causes":"Stress","high_causes":"Allergies","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"basophilcount","name":"Basophil Count","group":"HEMATOLOGY","result":"0.01","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.2917","lower_normal":"0.02","upper_normal":"0.1","lower_optimal":"0.02","upper_optimal":"0.08","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3333333333","upper_optimal_position":"0.5833333333","units":"x 10^9/L","description":"Below range at 0.01. Minor finding","low_causes":"Stress","high_causes":"Allergies","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"reticulocytecount","name":"Reticulocyte Count","group":"HEMATOLOGY","result":"0.67","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.3617","lower_normal":"0.5","upper_normal":"2.5","lower_optimal":"1","upper_optimal":"2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4166666667","upper_optimal_position":"0.5833333333","units":"%","description":"Within range but below optimal","low_causes":"Bone marrow suppression","high_causes":"Blood loss","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"reticulocyteabsolute","name":"Reticulocyte Absolute","group":"HEMATOLOGY","result":"29.28","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.1952","lower_normal":"50","upper_normal":"100","lower_optimal":"55","upper_optimal":"80","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3666666667","upper_optimal_position":"0.5333333333","units":"x 10^9/L","description":"Significantly below range at 29.28 (lower limit 50). The bone marrow is producing far fewer new red blood cells than it should. Combined with the severe neutropenia (0.99), the bone marrow appears broadly suppressed. The most likely cause is the extreme exercise volume exceeding the body's capacity to maintain full blood cell production. The iron transport issue (transferrin saturation 14.56% below range) may also be limiting the bone marrow's ability to produce red cells at full capacity despite adequate iron stores (ferritin 82)","low_causes":"Exercise-induced bone marrow suppression, iron transport insufficiency","high_causes":"Blood loss","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"iron","name":"Iron","group":"IRON STUDIES","result":"9.4","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.3396","lower_normal":"9","upper_normal":"30.4","lower_optimal":"15","upper_optimal":"22","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4267912773","upper_optimal_position":"0.5358255452","units":"umol/L","description":"At the absolute floor of range at 9.4 (lower limit 9). Despite taking iron supplements, circulating iron is almost below range. This creates a paradox with the ferritin (82, healthy stores): the body has iron in reserve but is not getting it into the bloodstream quickly enough to meet the extreme exercise demand. The training volume is consuming iron faster than it can be absorbed and mobilised. Timing and form of iron supplementation should be reviewed (taken on an empty stomach with vitamin C, away from tea, coffee, dairy, and other supplements that impair absorption)","low_causes":"Intense exercise demand exceeding absorption, poor supplement timing","high_causes":"Hemochromatosis","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"ferritin","name":"Ferritin","group":"IRON STUDIES","result":"82","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4187","lower_normal":"10","upper_normal":"291","lower_optimal":"50","upper_optimal":"150","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3807829181","upper_optimal_position":"0.4994068802","units":"ng/mL","description":"Within optimal at 82. Healthy iron stores. The issue is transport (iron 9.4 at floor, transferrin saturation 14.56% below range) rather than storage","low_causes":"Iron deficiency","high_causes":"Iron overload","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"tibc","name":"TIBC","group":"IRON STUDIES","result":"61.4","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.514","lower_normal":"44","upper_normal":"76.1","lower_optimal":"50","upper_optimal":"65","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3956386293","upper_optimal_position":"0.5514018692","units":"umol/L","description":"Within optimal. The body's iron transport capacity is adequate, but the saturation at 14.56% shows the available transport is not being filled","low_causes":"Iron overload","high_causes":"Iron deficiency","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"transferrinsaturation","name":"Transferrin Saturation","group":"IRON STUDIES","result":"14.56","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.3023","lower_normal":"18","upper_normal":"55","lower_optimal":"25","upper_optimal":"40","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3963963964","upper_optimal_position":"0.5315315315","units":"%","description":"Below the normal range at 14.56% (lower limit 18%). Only 14.56% of the available iron transport is carrying iron, meaning the blood delivery system is running nearly empty despite healthy stores (ferritin 82). This is the mechanism behind the suppressed reticulocyte production (29.28) and the elevated RDW (14.4): the bone marrow does not have enough circulating iron to produce red cells at full capacity. Optimising iron supplement absorption is the priority","low_causes":"Intense exercise demand, poor absorption timing","high_causes":"Iron overload","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"transferrin","name":"Transferrin","group":"IRON STUDIES","result":"2.57","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.3513","lower_normal":"2.5","upper_normal":"3.8","lower_optimal":"2.6","upper_optimal":"3.2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.358974359","upper_optimal_position":"0.5128205128","units":"g/L","description":"Within range","low_causes":"Iron overload","high_causes":"Iron deficiency","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"testosterone","name":"Testosterone","group":"HORMONES","result":"3.6","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.8254","lower_normal":"0.5","upper_normal":"2.6","lower_optimal":"0.8","upper_optimal":"2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.380952381","upper_optimal_position":"0.5714285714","units":"nmol/L","description":"Above the normal range for females at 3.6 (limit 2.6). Despite reporting low sex drive, testosterone is elevated. This is likely being driven by the extreme exercise and bodybuilding volume, as resistance training stimulates androgen production. DHEA supplementation (if included in the supplement regimen) can also convert to testosterone. Elevated testosterone in women can cause acne, hair thinning, or voice changes, though these were not reported. The low libido is paradoxical with elevated testosterone and suggests the issue is oestrogen-related rather than androgen-related (discussed under oestradiol below)","low_causes":"Low production","high_causes":"Intense resistance training, DHEA supplementation, adrenal","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"freetestosterone","name":"Free Testosterone","group":"HORMONES","result":"0.0476","within_normal":"","within_optimal":"" // ============================================================
//  TrueVitals report engine — builds everything from REPORT_DATA
// ============================================================
const data = REPORT_DATA;
const bms = (data.biomarkers || []).map(b => ({ ...b }));

const esc = (s) => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

// ---- helpers -------------------------------------------------
function statusOf(b) {
  if (b.within_normal === 'FALSE') return 'flag';
  if (b.within_optimal === 'TRUE') return 'optimal';
  if (b.within_normal === 'TRUE') return 'range';
  return 'qual'; // qualitative (Negative etc.)
}
const num = (v) => (v === '' || v == null ? null : parseFloat(v));

// ---- global stats -------------------------------------------
const assessable = bms.filter(b => b.within_optimal === 'TRUE' || b.within_optimal === 'FALSE');
const totalTested = bms.length;
const flaggedCount = bms.filter(b => b.within_normal === 'FALSE').length;
const optimalCount = bms.filter(b => b.within_optimal === 'TRUE').length;
const rangeCount = bms.filter(b => b.within_normal === 'TRUE' && b.within_optimal !== 'TRUE').length;
const healthPct = assessable.length ? Math.round((optimalCount / assessable.length) * 100) : 0;

// ---- groups --------------------------------------------------
const groupOrder = ['LIVER & METABOLIC','LIPIDS & CARDIOVASCULAR','GLUCOSE & INSULIN','INFLAMMATION','ELECTROLYTES & MINERALS','KIDNEY FUNCTION','HEMATOLOGY','IRON STUDIES','HORMONES','THYROID','VITAMINS & NUTRIENTS','CARDIAC MARKERS','DIGESTIVE','IMMUNOLOGY','PROSTATE','TUMOR MARKERS','SPECIALIZED TESTS','AUTOIMMUNE & CELIAC','URINALYSIS'];
const groups = {};
bms.forEach(b => { (groups[b.group] = groups[b.group] || []).push(b); });

function groupStatus(names) {
  let markers = [];
  names.forEach(n => { if (groups[n]) markers = markers.concat(groups[n]); });
  if (!markers.length) return null;
  const flagged = markers.filter(b => b.within_normal === 'FALSE').length;
  if (flagged) return { s: 'flag', flagged, total: markers.length, optimal: markers.filter(b => b.within_optimal === 'TRUE').length };
  const nonOpt = markers.filter(b => b.within_normal === 'TRUE' && b.within_optimal !== 'TRUE').length;
  const optimal = markers.filter(b => b.within_optimal === 'TRUE').length;
  return { s: nonOpt ? 'amber' : 'optimal', flagged: 0, total: markers.length, optimal };
}

function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }

function rangeBar(b, big){
  const rp = num(b.result_position); if (rp == null) return '';
  const lnp = num(b.lower_normal_position), unp = num(b.upper_normal_position);
  if (lnp == null && unp == null) return '';
  const lo = num(b.lower_optimal_position), uo = num(b.upper_optimal_position);
  const st = statusOf(b);
  const dotc = st==='flag'?'red':st==='optimal'?'green':'amber';
  const L = (lnp==null?0:lnp)*100, U=(unp==null?1:unp)*100;
  const oL = (lo==null?L/100:lo)*100, oU=(uo==null?U/100:uo)*100;
  const pos = Math.max(2, Math.min(98, rp*100));
  return `<div class="rbar-wrap ${big?'rbar-big':''}">
    <div class="rbar">
      <div class="rbar-normal" style="left:${L}%;width:${Math.max(0,U-L)}%"></div>
      <div class="rbar-opt" style="left:${oL}%;width:${Math.max(0,oU-oL)}%"></div>
      <div class="rbar-dot dot-${dotc}" style="--x:${pos}%" data-x="${pos}"></div>
    </div>
  </div>`;
}

function bioCard(b){
  const st = statusOf(b);
  const col = st==='flag'?'red':st==='optimal'?'green':st==='qual'?'blue':'amber';
  const badge = st==='flag'?'Outside range':st==='optimal'?'Optimal':st==='qual'?esc(b.result||'—'):'In range';
  const bar = rangeBar(b, false);
  // detail
  let detail = '';
  if (b.description){
    const parts = (b.description||'').split(/(?<=\.)\s/);
    const head = parts.shift(); const rest = parts.join(' ');
    detail += `<p class="bc-desc"><strong>${esc(head)}</strong>${rest?' '+esc(rest):''}</p>`;
  }
  const ranges = [];
  if (b.lower_optimal!=='') ranges.push(`<span><em>Optimal low</em>${esc(b.lower_optimal)}</span>`);
  if (b.upper_optimal!=='') ranges.push(`<span><em>Optimal high</em>${esc(b.upper_optimal)}</span>`);
  if (b.lower_normal!=='') ranges.push(`<span><em>Normal low</em>${esc(b.lower_normal)}</span>`);
  if (b.upper_normal!=='') ranges.push(`<span><em>Normal high</em>${esc(b.upper_normal)}</span>`);
  if (ranges.length) detail += `<div class="bc-ranges">${ranges.join('')}</div>`;
  if (b.low_causes || b.high_causes){
    detail += `<div class="bc-causes">`;
    if (b.low_causes) detail += `<p><em>If low</em> ${esc(b.low_causes)}</p>`;
    if (b.high_causes) detail += `<p><em>If high</em> ${esc(b.high_causes)}</p>`;
    detail += `</div>`;
  }
  return `<div class="bc bc-${col}" data-status="${st}" data-name="${esc((b.name||'').toLowerCase())}">
    <div class="bc-main" onclick="toggleCard(this.parentElement)">
      <span class="bc-tick tick-${col}"></span>
      <div class="bc-info"><div class="bc-name">${esc(b.name)}</div><div class="bc-res">${esc(b.result)} ${esc(b.units||'')}</div></div>
      ${bar}
      <span class="chip chip-${st}">${badge}</span>
      <svg class="bc-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="bc-detail"><div class="bc-detail-in">${detail||'<p class="bc-desc">No additional detail for this marker.</p>'}</div></div>
  </div>`;
}

function toggleGrp(el){ el.classList.toggle('open'); animateBarsIn(el); }
function toggleCard(el){
  const open = el.classList.toggle('open');
  const d = el.querySelector('.bc-detail');
  d.style.maxHeight = open ? d.firstElementChild.scrollHeight + 24 + 'px' : '0px';
}
function goTo(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

function pickSystem(sysId){
  const sys = SYSTEMS.find(s=>s.id===sysId); if(!sys) return;
  // open matching groups, close others, scroll to first
  document.querySelectorAll('.grp').forEach(g=>{
    const on = sys.groups.includes(g.dataset.group);
    g.classList.toggle('open', on);
    if(on) animateBarsIn(g);
  });
  const first = sys.groups.map(g=>document.getElementById('grp-'+slug(g))).find(Boolean);
  if(first){
    // reset filters so the group is visible
    document.getElementById('search').value=''; setActiveFilter('all'); applyFilter();
    setTimeout(()=>first.scrollIntoView({behavior:'smooth',block:'start'}),60);
    first.classList.add('grp-flash'); setTimeout(()=>first.classList.remove('grp-flash'),1200);
  }
}

// tooltip for body map
const tipEl = document.createElement('div'); tipEl.className='bodytip'; document.body.appendChild(tipEl);
function tip(e,sysId){
  const sys=SYSTEMS.find(s=>s.id===sysId); const st=sys&&sys._st; if(!st) return;
  tipEl.innerHTML = `<strong>${esc(sys.label)}</strong>${st.optimal} of ${st.total} optimal${st.flagged?` · <span class="tip-red">${st.flagged} flagged</span>`:''}`;
  tipEl.classList.add('show'); tipMove(e);
}
function tipMove(e){ const t=(e&&e.touches&&e.touches[0])||e; if(!t||t.clientX==null){ tipHide(); return; } tipEl.style.left=t.clientX+'px'; tipEl.style.top=(t.clientY-14)+'px'; }
function tipHide(){ tipEl.classList.remove('show'); }

// filters
function setFilter(btn){ document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilter(); }
function setActiveFilter(f){ document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active', b.dataset.f===f)); }
function applyFilter(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const f=document.querySelector('.fbtn.active').dataset.f;
  document.querySelectorAll('.bc').forEach(c=>{
    let show=true;
    if(q && !c.dataset.name.includes(q)) show=false;
    if(f==='flag' && c.dataset.status!=='flag') show=false;
    if(f==='optimal' && c.dataset.status!=='optimal') show=false;
    c.style.display=show?'':'none';
  });
  document.querySelectorAll('.grp').forEach(g=>{
    const vis=[...g.querySelectorAll('.bc')].some(c=>c.style.display!=='none');
    g.style.display=vis?'':'none';
    if((q||f!=='all')&&vis) g.classList.add('open');
  });
}
window.setFilter=setFilter; window.applyFilter=applyFilter;

// range bar fill on reveal
function animateBarsIn(scope){
  (scope||document).querySelectorAll('.rbar-dot:not(.lit)').forEach(d=>{
    d.classList.add('lit'); requestAnimationFrame(()=>{ d.style.left=d.dataset.x+'%'; });
  });
}

// theme toggle
function toggleTheme(){
  const b=document.body; const light=b.getAttribute('data-theme')==='light';
  b.setAttribute('data-theme', light?'dark':'light');
  document.getElementById('themeLabel').textContent = light?'Light':'Dark';
}
window.toggleTheme=toggleTheme;

// print
function printReport(){
  document.querySelectorAll('.grp,.bc').forEach(el=>el.classList.add('open'));
  document.querySelectorAll('.bc-detail').forEach(d=>{ d.style.maxHeight='none'; });
  window.print();
}
window.printReport=printReport;

// scroll reveal + active nav
const revObs=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); }),{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));

const navSections=['overview','body','findings','flags','results'];
const navObs=new IntersectionObserver(es=>{
  es.forEach(e=>{ if(e.isIntersecting){
    document.querySelectorAll('.nav-links a,.mnav a').forEach(a=>a.classList.toggle('active', a.dataset.t===e.target.id));
  }});
},{rootMargin:'-45% 0px -50% 0px'});
navSections.forEach(id=>{ const el=document.getElementById(id); if(el) navObs.observe(el); });

// ============================================================
//  GATE + LAUNCH ANIMATION
// ============================================================
function runIntro(){
  // ring count-up
  const R=94, C=2*Math.PI*R; const fill=document.getElementById('ringFill');
  const R2=72, C2=2*Math.PI*R2; const fill2=document.getElementById('ringFill2');
  fill.style.strokeDasharray=C; fill.style.strokeDashoffset=C;
  fill2.style.strokeDasharray=C2; fill2.style.strokeDashoffset=C2;
  const optFrac=assessable.length?optimalCount/assessable.length:0;
  const flagFrac=totalTested?flaggedCount/totalTested:0;
  const t0=performance.now(), dur=1400;
  const pctEl=document.getElementById('ringPct');
  function step(t){
    const k=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-k,3);
    fill.style.strokeDashoffset=C*(1-optFrac*e);
    fill2.style.strokeDashoffset=C2*(1-flagFrac*e);
    pctEl.innerHTML=Math.round(healthPct*e)+'<span>%</span>';
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  // scan sweep + node pop
  const scan=document.getElementById('scan'); if(scan) scan.classList.add('run');
  document.querySelectorAll('.node').forEach((n,i)=>{ setTimeout(()=>n.classList.add('on'), 300+i*70); });
  // first-visible bars
  setTimeout(()=>animateBarsIn(document), 200);
}

const dob=document.getElementById('gate-dob');
const gerr=document.getElementById('gate-error');
dob.addEventListener('input',function(){
  let v=this.value.replace(/[^\d]/g,'').slice(0,8), f='';
  if(v.length>0)f=v.slice(0,2); if(v.length>2)f+=' / '+v.slice(2,4); if(v.length>4)f+=' / '+v.slice(4);
  this.value=f;
});
dob.addEventListener('keydown',e=>{ if(e.key==='Enter') verifyDob(); });
function verifyDob(){
  const norm=d=>{ let c=String(d).replace(/\s/g,''); if(/^\d{4}-\d{2}-\d{2}/.test(c)){ const p=c.split(/[-T]/); return p[2]+'/'+p[1]+'/'+p[0]; } return c; };
  if(norm(dob.value)===norm(data.dob)){
    document.getElementById('gate').classList.add('gate-out');
    setTimeout(()=>{ document.getElementById('gate').style.display='none'; },550);
    document.getElementById('app-nav').classList.remove('hide');
    document.getElementById('app-mnav').classList.remove('hide');
    app.classList.remove('hide');
    document.body.classList.add('unlocked');
    runIntro();
  } else {
    gerr.style.display='block'; dob.classList.add('shake');
    setTimeout(()=>dob.classList.remove('shake'),500);
  }
}
window.verifyDob=verifyDob;
dob.focus();

// print header fill
try{ document.getElementById('print-meta').innerHTML = (REPORT_DATA.patient_name||'')+'<br>Report date: '+(REPORT_DATA.report_date||'')+'<br>For informational purposes only'; }catch(e){}
</script>
