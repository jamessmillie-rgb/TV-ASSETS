<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueVitals Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080a; --bg2:#0d0d10; --surface:#131316; --surface2:#1a1a1e; --surface3:#212127;
  --border:#242429; --border2:#33333a;
  --text:#f7f7f8; --text2:#a5a5ae; --text3:#6e6e78;
  --green:#2ce4ad; --green-soft:rgba(44,228,173,.12); --green-mid:rgba(44,228,173,.28);
  --red:#ff5a5f; --red-soft:rgba(255,90,95,.12); --red-mid:rgba(255,90,95,.3);
  --amber:#e8c15a; --amber-soft:rgba(232,193,90,.12); --amber-mid:rgba(232,193,90,.3);
  --blue:#7c9bff; --blue-soft:rgba(124,155,255,.12);
  --silh-top:#17171c; --silh-bot:#101014; --silh-stroke:#2a2a31;
  --shadow:0 1px 0 rgba(255,255,255,.02), 0 10px 30px -12px rgba(0,0,0,.6);
  --r:16px; --r-sm:11px;
}
body[data-theme="light"]{
  --bg:#f6f7f9; --bg2:#eef0f4; --surface:#ffffff; --surface2:#f4f5f8; --surface3:#eceef2;
  --border:#e3e6ec; --border2:#d3d7df;
  --text:#14161c; --text2:#565b66; --text3:#8b909b;
  --green:#0fb488; --green-soft:rgba(15,180,136,.12); --green-mid:rgba(15,180,136,.28);
  --red:#e23d43; --red-soft:rgba(226,61,67,.1); --red-mid:rgba(226,61,67,.28);
  --amber:#c79514; --amber-soft:rgba(199,149,20,.12); --amber-mid:rgba(199,149,20,.3);
  --blue:#4864d8; --blue-soft:rgba(72,100,216,.1);
  --silh-top:#e9ecf1; --silh-bot:#dfe3ea; --silh-stroke:#cfd4dd;
  --shadow:0 1px 2px rgba(20,22,28,.04), 0 12px 30px -16px rgba(20,22,28,.18);
}
html{scroll-behavior:smooth;background:var(--bg)}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(1200px 600px at 80% -10%, rgba(44,228,173,.05), transparent 60%),radial-gradient(900px 500px at 0% 10%, rgba(124,155,255,.04), transparent 55%);}
.c-green{color:var(--green)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
a{color:var(--green)}
.hide{display:none!important}

/* ---------- NAV ---------- */
.nav{position:fixed;top:0;left:0;right:0;z-index:80;height:64px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;
  background:color-mix(in srgb,var(--bg) 78%, transparent);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.nav-brand{display:flex;align-items:center;gap:14px;min-width:0}
.brand{font-size:19px;font-weight:700;letter-spacing:-.4px}.brand span{color:var(--green)}
.gate-logo-img{display:block;width:180px;height:auto;margin:0 auto 14px}
.logo-dark,.logo-light{height:26px;width:auto;display:block}
.logo-light{display:none}
body[data-theme="light"] .logo-dark{display:none}
body[data-theme="light"] .logo-light{display:block}
.logo-print{height:30px;width:auto}
.foot-logo{height:24px;width:auto;margin:0 auto 12px;display:block}
body[data-theme="light"] .foot-logo.inv{display:none}
body[data-theme="light"] .foot-logo.std{display:block}
.foot-logo.std{display:none}
.nav-patient{font-size:12.5px;color:var(--text3);padding-left:14px;border-left:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--text3);text-decoration:none;font-size:13px;font-weight:500;padding:8px 13px;border-radius:9px;transition:.18s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--green);background:var(--green-soft)}
.nav-actions{display:flex;align-items:center;gap:8px}
.iconbtn{display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text2);background:transparent;border:1px solid var(--border2);border-radius:9px;padding:8px 12px;cursor:pointer;transition:.18s}
.iconbtn:hover{color:var(--text);border-color:var(--green);background:var(--green-soft)}
.iconbtn svg{width:15px;height:15px}
.iconbtn.primary{color:var(--green);border-color:var(--green-mid)}

/* ---------- MOBILE NAV ---------- */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:80;padding:8px 4px calc(8px + env(safe-area-inset-bottom,0));
  background:color-mix(in srgb,var(--bg) 88%, transparent);backdrop-filter:blur(22px);border-top:1px solid var(--border)}
.mnav-in{display:flex;justify-content:space-around}
.mnav a{flex:1;color:var(--text3);text-decoration:none;font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px}
.mnav a.active{color:var(--green)}
.mnav svg{width:20px;height:20px}

/* ---------- LAYOUT ---------- */
.wrap{max-width:940px;margin:0 auto;padding:92px 22px 120px}
section{margin-bottom:60px;opacity:1}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .6s cubic-bezier(.2,.7,.2,1),transform .6s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--green);margin-bottom:12px}
.sec-title{font-size:clamp(22px,3.4vw,30px);font-weight:700;letter-spacing:-.6px;margin-bottom:6px}
.sec-sub{color:var(--text2);font-size:15px;margin-bottom:26px;max-width:560px}

/* ---------- HERO ---------- */
.hero{display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center;
  background:linear-gradient(160deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:24px;padding:40px 40px;box-shadow:var(--shadow)}
.hero-name{font-size:clamp(34px,6vw,52px);font-weight:800;letter-spacing:-1.5px;line-height:1;display:flex;flex-direction:column;gap:10px;margin:6px 0 14px}
.hero-name-sub{font-size:15px;font-weight:500;letter-spacing:0;color:var(--text2)}
.hero-lede{color:var(--text2);font-size:15.5px;max-width:420px;margin-bottom:26px}
.hero-stats{display:flex;gap:26px;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column}
.hstat-n{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1}
.hstat-l{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-top:4px}
.hero-ring{position:relative;width:220px;height:220px;flex-shrink:0}
.ring-svg{width:100%;height:100%;overflow:visible}
.ring-track{fill:none;stroke:var(--surface3);stroke-width:12}
.ring-track2{fill:none;stroke:var(--surface2);stroke-width:6}
.ring-fill{fill:none;stroke:var(--green);stroke-width:12;stroke-linecap:round;filter:drop-shadow(0 0 8px var(--green-mid))}
.ring-fill2{fill:none;stroke:var(--red);stroke-width:6;stroke-linecap:round;opacity:.85}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.ring-pct span{font-size:22px;font-weight:600;color:var(--text2);margin-left:2px}
.ring-cap{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:6px}

/* ---------- ALERT ---------- */
.alert{display:flex;align-items:center;gap:16px;background:linear-gradient(120deg,var(--red-soft),transparent);border:1px solid var(--red-mid);border-radius:16px;padding:16px 18px;margin-bottom:28px;position:relative;overflow:hidden}
.alert::before{content:"";position:absolute;inset:0;border-radius:16px;border:1px solid var(--red);opacity:0;animation:pulse 2.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0}50%{opacity:.5}}
.alert-ic{flex-shrink:0;width:40px;height:40px;border-radius:11px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center}
.alert-ic svg{width:22px;height:22px}
.alert-body{flex:1;min-width:0}
.alert-title{font-weight:600;font-size:15px;margin-bottom:2px}
.alert-text{font-size:13px;color:var(--text2)}
.alert-btn{flex-shrink:0;font-family:inherit;font-weight:600;font-size:13px;color:var(--red);background:var(--red-soft);border:1px solid var(--red-mid);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.18s}
.alert-btn:hover{background:var(--red);color:#fff}

/* ---------- BODY MAP ---------- */
.bodywrap{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:22px;padding:20px;box-shadow:var(--shadow)}
.bodysvg{width:100%;max-width:520px;height:auto;display:block;margin:0 auto}
.silhouette{opacity:.9}
.leader{stroke:var(--border2);stroke-width:1;stroke-dasharray:3 4;opacity:.7}
.node{cursor:pointer;opacity:0;transform:scale(.4);transform-box:fill-box;transform-origin:center;transition:opacity .4s,transform .4s cubic-bezier(.34,1.56,.64,1)}
.node.on{opacity:1;transform:scale(1)}
.node-halo{fill:transparent;opacity:.16}
.node-dot{stroke:var(--bg);stroke-width:2}
.node-ic{color:#06110d;opacity:.85}
.node-green .node-dot{fill:var(--green)} .node-green .node-halo{fill:var(--green);animation:halo 3s ease-in-out infinite}
.node-amber .node-dot{fill:var(--amber)} .node-amber .node-halo{fill:var(--amber);animation:halo 3s ease-in-out infinite}
.node-red .node-dot{fill:var(--red)} .node-red .node-halo{fill:var(--red);animation:haloRed 1.8s ease-in-out infinite}
.node-red .node-ic,.node-amber .node-ic{color:#120c02}
body[data-theme="light"] .node-ic{color:#fff}
@keyframes halo{0%,100%{opacity:.14;r:18}50%{opacity:.26;r:22}}
@keyframes haloRed{0%,100%{opacity:.2}50%{opacity:.4}}
.node:hover .node-dot,.node:focus .node-dot{filter:brightness(1.15)}
.node:focus{outline:none}
.node:focus .node-halo{opacity:.4}
.scan rect{fill:var(--green);opacity:0}
.scan.run rect{animation:scan 1.5s cubic-bezier(.4,0,.2,1) 1}
@keyframes scan{0%{opacity:0;transform:translateY(70px)}10%{opacity:.5}90%{opacity:.5}100%{opacity:0;transform:translateY(330px)}}
.scan{transform-box:view-box}
.bodytip{position:fixed;z-index:200;transform:translate(-50%,-100%);background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:8px 11px;font-size:12px;color:var(--text);pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:var(--shadow);white-space:nowrap}
.bodytip.show{opacity:1}
.bodytip strong{display:block;font-size:12.5px;margin-bottom:1px}
.tip-red{color:var(--red)}
.mpills{display:none;gap:8px;overflow-x:auto;padding:14px 2px 4px;-webkit-overflow-scrolling:touch}
.mpill{flex-shrink:0;display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 13px;cursor:pointer;white-space:nowrap}
.mpill-dot{width:8px;height:8px;border-radius:50%}
.mpill-green .mpill-dot{background:var(--green)}.mpill-amber .mpill-dot{background:var(--amber)}.mpill-red .mpill-dot{background:var(--red)}

/* ---------- SYSTEM GRID ---------- */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.scard{display:flex;align-items:center;gap:13px;text-align:left;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:.2s;box-shadow:var(--shadow)}
.scard:hover{transform:translateY(-2px);border-color:var(--border2)}
.scard-ic{flex-shrink:0;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface2)}
.scard-ic svg{width:20px;height:20px;color:var(--text2)}
.scard-green .scard-ic{background:var(--green-soft)}.scard-green .scard-ic svg{color:var(--green)}
.scard-amber .scard-ic{background:var(--amber-soft)}.scard-amber .scard-ic svg{color:var(--amber)}
.scard-red .scard-ic{background:var(--red-soft)}.scard-red .scard-ic svg{color:var(--red)}
.scard-body{flex:1;min-width:0}
.scard-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.scard-meta{font-size:12px;color:var(--text3)}
.scard-badge{flex-shrink:0;font-size:10.5px;font-weight:600;padding:4px 8px;border-radius:7px;text-align:center}
.sb-green{background:var(--green-soft);color:var(--green)}.sb-amber{background:var(--amber-soft);color:var(--amber)}.sb-red{background:var(--red-soft);color:var(--red)}

/* ---------- TOP FINDINGS ---------- */
.finds{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.find{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);border-left:3px solid var(--border2)}
.find-red{border-left-color:var(--red)}.find-green{border-left-color:var(--green)}.find-amber{border-left-color:var(--amber)}
.find-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
.find-name{font-size:14px;font-weight:600}
.find-val{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-top:2px}
.find-val span{font-size:13px;font-weight:500;color:var(--text3)}
.find-desc{font-size:13px;color:var(--text2);margin-top:12px;line-height:1.6}

/* ---------- ANALYSIS CARDS ---------- */
.acard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 26px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;border-left:3px solid var(--border2)}
.acard-green{border-left-color:var(--green)}.acard-red{border-left-color:var(--red)}.acard-blue{border-left-color:var(--blue)}
.acard-h{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;margin-bottom:14px}
.acard-dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-blue{background:var(--blue)}
.acard-c{font-size:14.5px;color:var(--text2);line-height:1.85;white-space:pre-line}
.lead-warn{font-size:15px;font-weight:500;color:var(--text);line-height:1.7;padding:14px 16px;margin-bottom:16px;background:var(--red-soft);border-left:3px solid var(--red);border-radius:0 10px 10px 0;white-space:pre-line}
.numbered{padding-left:74px}
.num{position:absolute;left:22px;top:22px;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.num-red{background:var(--red-soft);color:var(--red)}.num-blue{background:var(--blue-soft);color:var(--blue)}

/* ---------- CONTROLS ---------- */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:22px}
.search{flex:1;min-width:200px;max-width:300px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px 15px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.18s}
.search:focus{border-color:var(--green)}
.search::placeholder{color:var(--text3)}
.fbtn{font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 16px;cursor:pointer;transition:.18s}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.active{color:var(--green);background:var(--green-soft);border-color:var(--green-mid)}

/* ---------- GROUPS ---------- */
.grp{margin-bottom:12px;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--surface)}
.grp-flash{box-shadow:0 0 0 2px var(--green-mid)}
.grp-h{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;cursor:pointer;user-select:none;transition:.18s}
.grp-h:hover{background:var(--surface2)}
.grp-name{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.7px}
.grp-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3)}
.grp-flag{color:var(--red);font-weight:600}
.chev{transition:transform .3s;color:var(--text3)}
.grp.open .chev{transform:rotate(180deg)}
.grp-body{display:none;padding:6px 12px 14px}
.grp.open .grp-body{display:block}

/* ---------- BIOMARKER CARD ---------- */
.bc{border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--bg2);transition:border-color .18s}
.bc:hover{border-color:var(--border2)}
.bc-red{background:linear-gradient(90deg,var(--red-soft),transparent 55%)}
.bc-green{background:linear-gradient(90deg,var(--green-soft),transparent 55%)}
.bc-amber{background:linear-gradient(90deg,var(--amber-soft),transparent 55%)}
.bc-main{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer}
.bc-tick{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tick-red{background:var(--red)}.tick-green{background:var(--green)}.tick-amber{background:var(--amber)}.tick-blue{background:var(--blue)}
.bc-info{flex:1;min-width:110px}
.bc-name{font-size:14px;font-weight:500}
.bc-res{font-size:13px;color:var(--text2)}
.chip{flex-shrink:0;font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.chip-flag{background:var(--red-soft);color:var(--red)}.chip-optimal{background:var(--green-soft);color:var(--green)}
.chip-range{background:var(--amber-soft);color:var(--amber)}.chip-qual{background:var(--blue-soft);color:var(--blue)}
.bc-chev{color:var(--text3);transition:transform .3s;flex-shrink:0}
.bc.open .bc-chev{transform:rotate(180deg)}
.bc-detail{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.bc-detail-in{padding:2px 16px 18px 39px;border-top:1px solid var(--border)}
.bc-desc{font-size:13.5px;color:var(--text2);line-height:1.7;padding-top:14px;margin-bottom:14px}
.bc-desc strong{color:var(--text);font-weight:600}
.bc-ranges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.bc-ranges span{font-size:11.5px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;gap:1px}
.bc-ranges em{font-style:normal;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.bc-causes{font-size:12.5px;color:var(--text3);line-height:1.6}
.bc-causes em{font-style:normal;color:var(--text2);font-weight:600}

/* ---------- RANGE BAR ---------- */
.rbar-wrap{flex:1;max-width:240px;min-width:130px}
.rbar-big{max-width:none;margin:4px 0 2px}
.rbar{position:relative;height:10px;border-radius:6px;overflow:visible;
  background:linear-gradient(90deg,var(--red-mid),var(--amber-mid) 35%,var(--amber-mid) 65%,var(--red-mid))}
.rbar-normal{position:absolute;top:0;height:100%;background:var(--amber-soft);border-radius:6px}
.rbar-opt{position:absolute;top:0;height:100%;background:var(--green-mid);border-radius:6px;box-shadow:inset 0 0 0 1px var(--green-soft)}
.rbar-dot{position:absolute;top:50%;left:50%;width:16px;height:16px;border-radius:50%;transform:translate(-50%,-50%);border:2.5px solid var(--bg2);transition:left 1s cubic-bezier(.34,1.3,.5,1)}
.rbar-dot.dot-red{background:var(--red);box-shadow:0 0 10px var(--red-mid)}
.rbar-dot.dot-green{background:var(--green);box-shadow:0 0 10px var(--green-mid)}
.rbar-dot.dot-amber{background:var(--amber);box-shadow:0 0 10px var(--amber-mid)}

/* ---------- FOOTER ---------- */
.foot{text-align:center;padding:44px 22px;border-top:1px solid var(--border);margin-top:40px}
/* foot-brand replaced by .foot-logo img */
.foot p{font-size:12px;color:var(--text3);margin-bottom:5px}

/* ---------- GATE ---------- */
.gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--bg);
  background-image:radial-gradient(700px 500px at 50% 30%, rgba(44,228,173,.1), transparent 60%);transition:opacity .5s,transform .5s}
.gate-out{opacity:0;transform:scale(1.04);pointer-events:none}
.gate-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:46px 40px;max-width:410px;width:90%;text-align:center;box-shadow:0 30px 80px -30px rgba(0,0,0,.7);overflow:hidden}
.gate-card>*{position:relative}
@keyframes spin{to{transform:rotate(360deg)}}
/* gate-logo replaced by .gate-logo-img */
.gate-sub{color:var(--text2);font-size:14px;margin-bottom:28px;line-height:1.55}
.gate-label{display:block;text-align:left;font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:8px}

const REPORT_DATA = {"patient_name":"Anett Vecseri","dob":"28/12/1985","report_date":"2026-07-22","summary":"Anett presents as a 40-year-old female with a BMI of 20.1, following a low-carb, high-protein diet rated 10 out of 10 for quality with a diet volume of only 3 out of 10. She performs 3 cardio sessions and 2 resistance sessions per week with 10,000 to 15,000 daily steps. She has no diagnosed medical conditions and takes no medications. She reports low mood and anxiety, brain fog, and joint pain and stiffness. Her goals are to build muscle, improve mood, and improve digestion and gut health.\n\nThere are genuine positives. Her lipid profile is excellent: HDL at 1.9 is within optimal, triglycerides at 0.66 are outstanding, ApoB at 0.82 is within range, ApoB/A-I ratio at 0.562 is well within the safe zone, and TC:HDL ratio at 2.37 is outstanding. The low-carb diet quality is clearly reflected here. Her liver is in excellent health (ALT 18, GGT 20, FIB-4 0.54). Her kidney function is excellent (Cystatin C 0.75, eGFR 106). Her iron stores are healthy (ferritin 109). Her vitamin D at 151 is within optimal. Her B12 at 415 and folate at 8 are both within optimal. Her thyroid is functioning with negative antibodies. Her inflammation markers are excellent (CRP 0.2, ESR 1). Her rheumatoid factor at 5 is well within range, ruling out rheumatoid arthritis as a cause of the joint pain. Her tumour markers are all within range. Her celiac screen is negative. Her urinalysis is normal. Her HbA1c at 36 (5.5%) is within optimal over the past 3 months.\n\nHowever, several findings reveal a body under significant metabolic stress, and they all trace back to one cause: insufficient food.\n\nAnett's diet quality is outstanding at 10 out of 10. But her diet volume is 3 out of 10, meaning she is eating far less than her body needs. At 52kg with 3 cardio sessions, 2 resistance sessions, and 10,000 to 15,000 steps per day, the caloric demand is very high. A diet volume of 3 out of 10 means the body is operating in a sustained energy deficit, and the blood results show the consequences across multiple systems.\n\nThe most striking finding is the HOMA-IR at 6.22, more than four times the upper limit of 1.5. HOMA-IR measures how effectively the body's cells respond to insulin, and at 6.22 the cells are severely resistant. In most cases, insulin resistance at this level is driven by excess body fat. But at BMI 20.1, that explanation does not apply. What is happening instead is a metabolic chain reaction driven by chronic undereating.\n\nWhen the body consistently receives far fewer calories than it burns, the adrenal glands produce more cortisol (measured at 416, above optimal) to mobilise internal energy. On a very low-carb diet, one of cortisol's primary actions is to instruct the liver to convert protein into glucose through a process called gluconeogenesis, because the brain and red blood cells require glucose to survive regardless of how few carbohydrates are eaten. This is why the fasting glucose is 6.5 (above range) on a diet that should theoretically produce very low blood sugar. The glucose is not coming from the food. The body is manufacturing it internally from the protein being eaten, because it perceives a fuel emergency. The insulin at 21.54 (high-normal) is the body's attempt to push this cortisol-driven glucose into cells, but the cells are resistant because cortisol directly impairs their insulin receptors. The result is a paradox: high blood sugar, high insulin, and severe insulin resistance in someone eating an excellent low-carb diet at a healthy BMI.\n\nThe cortisol at 416 is not being driven by psychological stress. It is a physiological alarm signal from a body that is not receiving enough energy. Cortisol at this level directly contributes to every symptom reported. It depletes the brain chemicals serotonin and dopamine, which regulate mood and motivation (explaining the low mood and anxiety). It impairs the prefrontal cortex, which governs focus and mental clarity (explaining the brain fog). And it breaks down connective tissue while impairing repair (explaining the joint pain and stiffness, particularly at this training volume).\n\nThe bone marrow is severely underproducing. Reticulocyte absolute at 22.734 is less than half of the lower limit of 50. The bone marrow needs calories, protein, iron, B12, and folate to produce new red blood cells. Iron (ferritin 109), B12 (415), and folate (8) are all adequate. The missing input is total energy. The body does not have enough fuel to sustain full blood cell production alongside training, recovery, and organ function. Haemoglobin at 130 is currently at the lower boundary of optimal, but if this production rate continues, it will fall.\n\nThe body's protein transport infrastructure is impaired. Transferrin at 1.81 and TIBC at 42.6 are both below range. Despite eating a high-protein diet, the body is not producing enough transport proteins because the protein is being diverted to gluconeogenesis (converted to glucose for fuel) rather than being used for its intended purpose of building and transporting. This is the cruellest irony of the situation: the high-protein diet is excellent in quality, but because the total volume is so low, the body is burning the protein for emergency energy rather than using it to build muscle, produce blood cells, or manufacture transport molecules.\n\nThe neutrophils at 1.86 are below range (limit 2), with lymphocytes at 3.06 above range (limit 3), creating an inverted NLR of 0.608. This immune pattern reflects the cortisol-driven suppression of the immune system.\n\nThe uric acid at 153 is below range (limit 184). On a high-protein diet, uric acid would normally be elevated because protein metabolism produces purines. A below-range reading suggests the body is not metabolising enough total food to produce even normal waste products.\n\nThe SHBG at 108.6 is within range but very high, and is binding virtually all of the testosterone being produced. Free testosterone at 0.007 is negligible. Low-carb diets raise SHBG, and chronic caloric restriction further increases it. The result is that despite adequate testosterone production (0.9, within range), the body cannot access it. Free testosterone supports mood, cognitive function, and connective tissue health in women, and at 0.007 all three are being impaired, connecting directly to the low mood, brain fog, and joint pain.\n\nThe lipase at 85 is above range (limit 60), indicating pancreatic irritation. On a very low-volume, high-protein diet, the pancreas may be receiving concentrated, infrequent meals that place disproportionate digestive demand on each eating episode. This is relevant to the gut health goal.\n\nThe FT3 at 4.3 is below optimal (4.5). Chronic caloric restriction is one of the most common causes of reduced T4 to T3 conversion, as the body deliberately slows its metabolic rate to conserve energy.\n\nThe ALP at 46 is at the absolute floor of range, consistent with nutritional insufficiency from the chronic energy deficit.\n\nThe PTH at 0.933 is below range, suppressed by the high vitamin D (151). Calcium is well maintained. This is expected and not concerning.\n\nThe Lp(a) result is still pending from the laboratory. Once received, this report will be updated with the result and any relevant context.","links":"The single most important message from this report is that Anett needs to eat more. The diet quality at 10 out of 10 is genuinely excellent, and the low-carb, high-protein approach is reflected beautifully in the lipid profile (triglycerides 0.66, HDL 1.9, ApoB 0.82). There is nothing wrong with what she is eating. The problem is how little of it she is eating.\n\nAt 52kg and 161cm with 3 cardio sessions, 2 resistance sessions, and 10,000 to 15,000 steps, caloric maintenance is approximately 1,800 to 2,100 calories. A diet volume of 3 out of 10 suggests intake is significantly below this. Every flagged finding in this report (the HOMA-IR at 6.22, the glucose at 6.5, the cortisol at 416, the suppressed bone marrow, the low transferrin, the low uric acid, the neutropenia, the very low free testosterone, the below-optimal FT3) traces back to the body not having enough fuel.\n\nThe muscle-building goal cannot be achieved in a caloric deficit. Muscle can only be built when the body has a small surplus of energy above what it needs for daily function and training. In the current state, the body is breaking down protein for emergency glucose production rather than using it to build muscle. More food is not just a health recommendation. It is the prerequisite for the primary goal.\n\nIncreasing caloric intake does not mean abandoning the dietary approach. The low-carb, high-protein framework can be maintained, but the volume needs to increase substantially. Practical steps: increase protein to at least 83 to 104g per day (1.6 to 2g per kilogram), add healthy fats (avocado, olive oil, nuts, oily fish) to increase caloric density without adding carbohydrates, and aim for at least 3 to 4 structured meals per day rather than fewer, larger meals (which would also reduce the digestive burden on the pancreas, addressing the elevated lipase at 85 and the gut health goal).\n\nSome reintroduction of carbohydrates may be beneficial. Not processed or sugary carbohydrates, but complex carbohydrates around training (sweet potato, oats, rice) would provide the body with direct fuel for exercise, reduce the reliance on gluconeogenesis (and therefore lower the cortisol-driven glucose production), and lower SHBG (allowing more free testosterone to reach the tissues, supporting mood, cognition, and joint health). Even 100 to 150g of carbohydrates per day, timed around training, would reduce the metabolic stress significantly while maintaining the benefits of a lower-carb approach.\n\nThe HOMA-IR at 6.22 and glucose at 6.5 should be discussed with a GP. While the mechanism here is metabolic stress rather than the typical obesity-driven insulin resistance, a GP should be aware. The resolution is nutritional rather than medical: increasing caloric intake would reduce cortisol, which would reduce gluconeogenesis, which would lower glucose, which would reduce insulin demand, which would improve the HOMA-IR. The GP may wish to retest after 8 to 12 weeks of increased intake.\n\nThe lipase at 85 should be mentioned to the GP. More frequent, smaller meals would reduce the per-meal digestive burden.\n\nFor the joint pain, the rheumatoid factor is normal (no autoimmune component), the CRP and ESR are excellent (no inflammatory process). The joint pain is being driven by the cortisol (which breaks down connective tissue while impairing repair), the negligible free testosterone (which maintains collagen and joint structures), and the chronic energy deficit (which deprives the joints of the building blocks for repair). All three improve with more food.\n\nFor the mood and brain fog, the cortisol at 416 depleting serotonin and dopamine, the negligible free testosterone (0.007), and the below-optimal FT3 (4.3) are all contributing. All three improve with increased caloric intake.\n\nFor the gut health goal, the elevated lipase suggests the pancreas is under strain. Smaller, more frequent meals rather than concentrated infrequent eating would support digestion. The celiac screen is negative.\n\nMagnesium glycinate before bed would support sleep, mood, and muscle recovery.","flags":"HOMA-IR at 6.22 (more than 4 times the upper limit of 1.5). Severe insulin resistance driven by chronic caloric insufficiency and cortisol-mediated gluconeogenesis, not by obesity or dietary excess. Fasting glucose 6.5 (above range). Insulin 21.54 (high-normal, body overproducing to overcome resistance). HbA1c 36 (currently optimal). GP discussion recommended. Resolution is nutritional.\n\nReticulocyte absolute at 22.734 (less than half the lower limit of 50). Bone marrow severely underproducing new red blood cells due to caloric insufficiency. Haemoglobin 130 at lower boundary of optimal. Risk of anaemia if sustained.\n\nLipase at 85 (above range, limit 60). Pancreatic irritation, likely from concentrated infrequent high-protein meals. GP discussion recommended.\n\nCortisol at 416 (above optimal 400). Physiological stress response to chronic energy deficit. Driving gluconeogenesis, insulin resistance, immune suppression, and connective tissue breakdown. Connected to all three symptoms reported.\n\nNeutrophils at 1.86 (below range) with lymphocytes 3.06 (above range). NLR 0.608 (inverted). Cortisol-driven immune suppression.\n\nTransferrin at 1.81 and TIBC at 42.6 (both below range). Protein synthesis reduced by chronic caloric deficit despite high-protein diet. Iron stores adequate (ferritin 109).\n\nUric acid at 153 (below range). Paradoxically low on a high-protein diet. Indicates insufficient total food metabolism.\n\nSHBG at 108.6 (above optimal). Free testosterone 0.007 (negligible). Low-carb diet and caloric restriction raising SHBG, binding all testosterone. Contributes to low mood, brain fog, and joint pain.\n\nFT3 at 4.3 (below optimal). Reduced T4 to T3 conversion from chronic caloric restriction. Slows metabolism.\n\nALP at 46 (at floor of range). Nutritional insufficiency.\n\nPTH at 0.933 (below range). Suppressed by high vitamin D (151). Expected. Not concerning.\n\nBasophils 0.01 (below range). Minor.\n\nTAA at 1.87 (above range). Supplementation.\n\nLp(a) to follow.","recommendations":"The HOMA-IR (6.22), glucose (6.5), and cortisol (416) findings should be discussed with a GP. The mechanism is chronic energy deficit rather than dietary excess. A retest after 8 to 12 weeks of increased caloric intake would show whether these normalise.\n\nThe lipase (85) should be mentioned to the GP.\n\nIncrease caloric intake substantially. Maintain the dietary quality but increase volume from 3 to at least 6 or 7 out of 10.\n\nConsider reintroducing 100 to 150g of complex carbohydrates daily, timed around training.\n\nEat 3 to 4 structured meals per day rather than fewer concentrated meals.\n\nA follow-up blood test in 12 weeks focusing on glucose, insulin, HOMA-IR, HbA1c, cortisol, reticulocyte count, transferrin, lipase, FT3, and free testosterone is recommended.\n\nThe Lp(a) result is pending. Once received, this report will be updated.","supplementation":"Magnesium glycinate at 300 to 400mg before bed. Supports sleep quality, mood (relevant to the low mood and anxiety), muscle recovery, and insulin sensitivity (relevant to the HOMA-IR at 6.22).\n\nOmega-3 fish oil at 2g of combined EPA and DHA daily. Supports mood, cardiovascular health, and has anti-inflammatory properties for joint comfort.\n\nCollagen peptides at 10 to 15g daily with vitamin C. Supports joint and connective tissue repair, which is being impaired by the elevated cortisol breaking down collagen faster than it can be rebuilt.\n\nContinue vitamin D at current dose (151, within optimal). Continue any current B12 supplementation.\n\nThe most impactful intervention from this report is not a supplement. It is eating more of the already excellent diet. The quality is outstanding. The body simply needs more of it. Without more food, the muscle-building goal is physiologically impossible, the mood and brain fog will persist, the joints will continue to hurt, and the metabolic stress will worsen.","biomarkers":[{"key":"albumin","name":"Albumin","group":"LIVER & METABOLIC","result":"41","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4792","lower_normal":"34","upper_normal":"50","lower_optimal":"40","upper_optimal":"48","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4583333333","upper_optimal_position":"0.625","units":"g/L","description":"Within optimal at 41","low_causes":"Liver disease","high_causes":"Dehydration","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":" ow_causes":"Very low TG, high HDL","high_causes":"Insulin resistance","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"remnantcholesterol","name":"Remnant Cholesterol","group":"LIPIDS & CARDIOVASCULAR","result":"0.3","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.1875","lower_normal":"","upper_normal":"0.8","lower_optimal":"","upper_optimal":"0.5","lower_normal_position":"0","upper_normal_position":"0.5","lower_optimal_position":"","upper_optimal_position":"0.3125","units":"mmol/L","description":"Within optimal","low_causes":"Very low TG","high_causes":"Metabolic syndrome","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"lipoproteina","name":"Lipoprotein(a)","group":"LIPIDS & CARDIOVASCULAR","result":"To follow","within_normal":"","within_optimal":"","result_position":"","lower_normal":"","upper_normal":"32","lower_optimal":"","upper_optimal":"14","lower_normal_position":"0","upper_normal_position":"0.5","lower_optimal_position":"0","upper_optimal_position":"0.2188","units":"nmol/L","description":"Result to follow from the laboratory. Lp(a) is a genetically inherited cardiovascular risk marker that cannot be changed by diet or exercise. The result will be communicated when available","low_causes":"","high_causes":"","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"glucose","name":"Glucose","group":"GLUCOSE & INSULIN","result":"6.5","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.7333","lower_normal":"3.5","upper_normal":"6","lower_optimal":"4.2","upper_optimal":"5","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4266666667","upper_optimal_position":"0.5333333333","units":"mmol/L","description":"Above the normal fasting range at 6.5 (limit 6). This is a counterintuitive finding on a low-carb, high-protein diet where blood sugar would normally be expected to be low. The explanation lies in a process called gluconeogenesis, which is central to understanding several findings in this report.\n\nWhen the body is chronically underfuelled (diet volume 3 out of 10 at 52kg with 3 cardio sessions, 2 resistance sessions, and 10,000 to 15,000 daily steps), it enters a state of metabolic stress. The adrenal glands respond by producing more cortisol (measured at 416, above the optimal range), and one of cortisol's primary jobs is to raise blood sugar by instructing the liver to convert protein into glucose. This process is called gluconeogenesis. On a very low-carb diet with inadequate total calories, the body has no choice but to produce its own glucose from the protein being eaten, because the brain and red blood cells require glucose to survive. The result is elevated blood sugar not from eating too much sugar, but from the body manufacturing glucose internally because it perceives a fuel emergency.\n\nThe HOMA-IR at 6.22 (discussed below) shows the cells are not responding to insulin properly, which means the glucose being produced through gluconeogenesis is not being cleared efficiently. This creates a cycle: the body produces glucose because it needs energy, but the cells resist absorbing it because the chronic stress has impaired their insulin receptors","low_causes":"Excessive insulin","high_causes":"Chronic energy deficit driving gluconeogenesis, cortisol-mediated glucose production","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"hba1c","name":"HbA1c","group":"GLUCOSE & INSULIN","result":"36","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.4286","lower_normal":"","upper_normal":"42","lower_optimal":"","upper_optimal":"35","lower_normal_position":"0","upper_normal_position":"0.5","lower_optimal_position":"","upper_optimal_position":"0.4166666667","units":"mmol/mol","description":"Average blood sugar over 3 months. At 36 (5.5%), within optimal. This is reassuring because it means the elevated fasting glucose (6.5) has not been sustained long enough to shift the three-month average into danger. However, the fasting glucose and the HOMA-IR (6.22) suggest the metabolic stress is recent or intermittent, and if the current eating pattern continues, HbA1c will eventually begin to rise","low_causes":"Iron deficiency","high_causes":"Prediabetes","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"insulin","name":"Insulin","group":"GLUCOSE & INSULIN","result":"21.54","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.6164","lower_normal":"2.6","upper_normal":"24.9","lower_optimal":"3","upper_optimal":"10","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3393124066","upper_optimal_position":"0.4439461883","units":"mIU/L","description":"Within the laboratory range at 21.54 but significantly above optimal (limit 10). At BMI 20.1 on a low-carb diet, insulin this high is not being driven by dietary sugar or carbohydrate excess. The body is producing large amounts of insulin in an attempt to force the cortisol-driven glucose (6.5) into cells that are resisting. The high insulin combined with the high glucose creates the very high HOMA-IR (6.22). In someone of this weight and diet quality, this is a clear signal of chronic metabolic stress from insufficient caloric intake rather than the dietary excess that typically causes insulin resistance","low_causes":"Low production","high_causes":"Metabolic stress, cortisol-driven insulin demand","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"cpeptide","name":"C-Peptide","group":"GLUCOSE & INSULIN","result":"847.4","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.494","lower_normal":"240","upper_normal":"1500","lower_optimal":"400","upper_optimal":"800","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3756613757","upper_optimal_position":"0.4814814815","units":"pmol/L","description":"Within range at 847.4 but above optimal. Confirms the pancreas is working hard to produce insulin to overcome the insulin resistance. The pancreas is not failing; it is being overworked","low_causes":"Low output","high_causes":"High demand from insulin resistance","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"homair","name":"HOMA-IR","group":"GLUCOSE & INSULIN","result":"6.22","within_normal":"FALSE","within_optimal":"FALSE","result_position":"1","lower_normal":"0.5","upper_normal":"1.5","lower_optimal":"0.5","upper_optimal":"1","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3333333333","upper_optimal_position":"0.5","units":"Ratio","description":"Significantly above the normal range at 6.22 (limit 1.5), more than four times the upper threshold. This is the most metabolically significant finding in the report. HOMA-IR measures how effectively the body's cells respond to insulin. At 6.22, the cells are severely resistant.\n\nIn most cases, HOMA-IR above 1.5 is driven by excess body fat, particularly around the abdomen. But at BMI 20.1, that explanation does not apply. Instead, the insulin resistance here is being driven by chronic energy restriction. When the body consistently receives far fewer calories than it needs (diet volume 3 out of 10 at this activity level), the stress response causes cortisol to rise (416, above optimal). Elevated cortisol directly impairs insulin signalling at the cellular level, because cortisol's evolutionary purpose is to keep glucose available in the blood during emergencies rather than allowing it to be stored. The body is behaving as though it is in a sustained emergency, keeping glucose high and preventing cells from absorbing it.\n\nThe resolution is not to reduce carbohydrates further or to exercise more. It is to eat more. Increasing caloric intake would reduce the metabolic stress, allow cortisol to normalise, and restore the cells' ability to respond to insulin. This finding should be discussed with a GP","low_causes":"Extreme sensitivity","high_causes":"Chronic energy restriction, cortisol-driven cellular resistance","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"homab","name":"HOMA-B","group":"GLUCOSE & INSULIN","result":"143.6","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.51","lower_normal":"80","upper_normal":"200","lower_optimal":"80","upper_optimal":"200","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3333333333","upper_optimal_position":"0.6666666667","units":"","description":"Within range at 143.6. The pancreas is producing adequate insulin. The issue is not production but the cells' resistance to what is being produced","low_causes":"Efficient sensitivity","high_causes":"Overcompensating for resistance","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"hscrp","name":"High Sensitivity CRP","group":"INFLAMMATION","result":"0.2","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.02","lower_normal":"","upper_normal":"5","lower_optimal":"","upper_optimal":"1","lower_normal_position":"0","upper_normal_position":"0.5","lower_optimal_position":"","upper_optimal_position":"0.1","units":"mg/L","description":"Within optimal at 0.2. Excellent. No systemic inflammation","low_causes":"Rarely significant","high_causes":"Infection, inflammation","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"esr","name":"ESR","group":"INFLAMMATION","result":"1","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.0417","lower_normal":"","upper_normal":"12","lower_optimal":"","upper_optimal":"5","lower_normal_position":"0","upper_normal_position":"0.5","lower_optimal_position":"","upper_optimal_position":"0.2083333333","units":"mm/hour","description":"Excellent at 1","low_causes":"Rarely significant","high_causes":"Infection","padding":"1","one_sided":"0.5","range_type":"no lower"},{"key":"nlr","name":"Neut sition":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3333333333","upper_optimal_position":"0.5833333333","units":"x 10^9/L","description":"Below range at 0.01. Minor finding","low_causes":"Stress","high_causes":"Allergies","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"reticulocytecount","name":"Reticulocyte Count","group":"HEMATOLOGY","result":"0.54","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.34","lower_normal":"0.5","upper_normal":"2.5","lower_optimal":"1","upper_optimal":"2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4166666667","upper_optimal_position":"0.5833333333","units":"%","description":"Within range but near the floor","low_causes":"Bone marrow suppression","high_causes":"Blood loss","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"reticulocyteabsolute","name":"Reticulocyte Absolute","group":"HEMATOLOGY","result":"22.734","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.1516","lower_normal":"50","upper_normal":"100","lower_optimal":"55","upper_optimal":"80","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3666666667","upper_optimal_position":"0.5333333333","units":"x 10^9/L","description":"Significantly below the normal range at 22.734 (lower limit 50), less than half of what it should be. The bone marrow is producing far fewer new red blood cells than the body needs. Red blood cells have a lifespan of approximately 120 days, and the bone marrow must constantly produce replacements. At 22.734, the production rate is so low that if sustained, haemoglobin (currently 130, at the lower boundary of optimal) will begin to fall and anaemia will develop. The bone marrow needs calories, protein, iron, B12, and folate to produce blood cells. Iron stores are adequate (ferritin 109), B12 is adequate (415), and folate is adequate (8). The missing input is calories. At a diet volume of 3 out of 10 with this training load, the body does not have the total energy to sustain full blood cell production alongside everything else it is trying to do","low_causes":"Severe caloric insufficiency, bone marrow cannot sustain production","high_causes":"Blood loss","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"iron","name":"Iron","group":"IRON STUDIES","result":"17.3","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4626","lower_normal":"9","upper_normal":"30.4","lower_optimal":"15","upper_optimal":"22","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.4267912773","upper_optimal_position":"0.5358255452","units":"umol/L","description":"Within optimal","low_causes":"Iron deficiency","high_causes":"Hemochromatosis","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"ferritin","name":"Ferritin","group":"IRON STUDIES","result":"109","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.4508","lower_normal":"10","upper_normal":"291","lower_optimal":"50","upper_optimal":"150","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3807829181","upper_optimal_position":"0.4994068802","units":"ng/mL","description":"Within optimal at 109. Healthy iron stores. Iron is not the issue behind the suppressed reticulocyte production; the issue is total energy","low_causes":"Iron deficiency","high_causes":"Iron overload","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"tibc","name":"TIBC","group":"IRON STUDIES","result":"42.6","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.3188","lower_normal":"44","upper_normal":"76.1","lower_optimal":"50","upper_optimal":"65","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3956386293","upper_optimal_position":"0.5514018692","units":"umol/L","description":"Below the normal range at 42.6 (lower limit 44). TIBC (total iron binding capacity) represents the body's capacity to transport iron. Low TIBC alongside low transferrin (1.81) means the body is not producing enough transport protein. Despite adequate iron stores (ferritin 109) and adequate circulating iron (17.3), the transport infrastructure is reduced. Chronic caloric restriction suppresses the liver's production of transport proteins","low_causes":"Insufficient protein synthesis from chronic energy deficit","high_causes":"Iron deficiency","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"transferrinsaturation","name":"Transferrin Saturation","group":"IRON STUDIES","result":"38.06","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.5141","lower_normal":"18","upper_normal":"55","lower_optimal":"25","upper_optimal":"40","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3963963964","upper_optimal_position":"0.5315315315","units":"%","description":"Within optimal. The available transport is adequately loaded with iron, confirming the issue is the amount of transport available (low TIBC, low transferrin) rather than the iron itself","low_causes":"Iron deficiency","high_causes":"Iron overload","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"transferrin","name":"Transferrin","group":"IRON STUDIES","result":"1.81","within_normal":"FALSE","within_optimal":"FALSE","result_position":"0.1564","lower_normal":"2.5","upper_normal":"3.8","lower_optimal":"2.6","upper_optimal":"3.2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.358974359","upper_optimal_position":"0.5128205128","units":"g/L","description":"Below the normal range at 1.81 (lower limit 2.5). Transferrin is the protein that carries iron through the bloodstream, and the body needs adequate calories and protein to produce it. At 1.81, the liver is not manufacturing enough transport protein. Combined with the low TIBC (42.6), this confirms the body's protein synthesis capacity is reduced by the chronic caloric deficit. This does not mean Anett needs more protein (the diet quality is already 10 out of 10 with a high-protein focus). It means the body needs more total food so that the protein being eaten can be used for its intended purposes (building transport molecules, repairing tissue, growing muscle) rather than being diverted to emergency glucose production","low_causes":"Chronic caloric deficit reducing protein synthesis","high_causes":"Iron deficiency","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"testosterone","name":"Testosterone","group":"HORMONES","result":"0.9","within_normal":"TRUE","within_optimal":"TRUE","result_position":"0.3968","lower_normal":"0.5","upper_normal":"2.6","lower_optimal":"0.8","upper_optimal":"2","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.380952381","upper_optimal_position":"0.5714285714","units":"nmol/L","description":"Within range at 0.9. In the lower half of normal for a premenopausal female","low_causes":"Low production","high_causes":"PCOS","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"freetestosterone","name":"Free Testosterone","group":"HORMONES","result":"0.007","within_normal":"","within_optimal":"","result_position":"","lower_normal":"","upper_normal":"","lower_optimal":"","upper_optimal":"","lower_normal_position":"","upper_normal_position":"","lower_optimal_position":"","upper_optimal_position":"","units":"nmol/L","description":"Very low at 0.007. Despite adequate total testosterone (0.9), virtually none is available for the body to use because the SHBG at 108.6 is capturing it. Free testosterone supports mood, cognitive function, joint and connective tissue health, and sexual function in women. At 0.007, the body is receiving almost no testosterone benefit, which connects directly to the low mood, brain fog, and joint stiffness reported","low_causes":"","high_causes":"","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"freeandrogenindex","name":"Free Androgen Index","group":"HORMONES","result":"0.83","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.3517","lower_normal":"0.5","upper_normal":"6.5","lower_optimal":"1","upper_optimal":"5","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3611111111","upper_optimal_position":"0.5833333333","units":"Ratio","description":"Within range but at the very low end at 0.83. Confirms negligible testosterone availability","low_causes":"Low androgens, high SHBG","high_causes":"PCOS","padding":"1","one_sided":"0.5","range_type":"normal"},{"key":"shbg","name":"SHBG","group":"HORMONES","result":"108.6","within_normal":"TRUE","within_optimal":"FALSE","result_position":"0.5612","lower_normal":"27.8","upper_normal":"146","lower_optimal":"40","upper_optimal":"100","lower_normal_position":"0.3333333333","upper_normal_position":"0.6666666667","lower_optimal_position":"0.3677382967","upper_optimal_position":"0.5369430344","units":"nmol/L","description":"Within range but above optimal at 108.6. SHBG is a protein produced by the liver that binds sex hormones and prevents them from reaching the tissues. At 108.6, it is binding virtually all of the testosterone being produced (free testosterone 0.007). Low-carb diets are known to raise SHBG, and chronic caloric restriction can further increase it. The elevated cortisol (416) may also contribute. The result is that despite adequate total testosterone production, the body cannot access it. Increasing caloric intake and potentially including more carbohydrates in the diet would be expected to lower SHBG and allow more testosterone to reach the tissues where it supports mood, brain function, and joint health","low_causes":"Obesity, insulin resistance","high_causes":"Low-carb diet function statusOf(b) {
  if (b.within_normal === 'FALSE') return 'flag';
  if (b.within_optimal === 'TRUE') return 'optimal';
  if (b.within_normal === 'TRUE') return 'range';
  return 'qual'; // qualitative (Negative etc.)
}

const optimalCount = bms.filter(b => b.within_optimal === 'TRUE').length;
const rangeCount = bms.filter(b => b.within_normal === 'TRUE' && b.within_optimal !== 'TRUE').length;

// ---- groups --------------------------------------------------
const groupOrder = ['LIVER & METABOLIC','LIPIDS & CARDIOVASCULAR','GLUCOSE & INSULIN','INFLAMMATION','ELECTROLYTES & MINERALS','KIDNEY FUNCTION','HEMATOLOGY','IRON STUDIES','HORMONES','THYROID','VITAMINS & NUTRIENTS','CARDIAC MARKERS','DIGESTIVE','IMMUNOLOGY','PROSTATE','TUMOR MARKERS','SPECIALIZED TESTS','AUTOIMMUNE & CELIAC','URINALYSIS'];
const groups = {};
bms.forEach(b => { (groups[b.group] = groups[b.group] || []).push(b); });

function groupStatus(names) {
  let markers = [];
  names.forEach(n => { if (groups[n]) markers = markers.concat(groups[n]); });
  if (!markers.length) return null;
  const flagged = markers.filter(b => b.within_normal === 'FALSE').length;
  if (flagged) return { s: 'flag', flagged, total: markers.length, optimal: markers.filter(b => b.within_optimal === 'TRUE').length };
  const nonOpt = markers.filter(b => b.within_normal === 'TRUE' && b.within_optimal !== 'TRUE').length;
  const optimal = markers.filter(b => b.within_optimal === 'TRUE').length;
  return { s: nonOpt ? 'amber' : 'optimal', flagged: 0, total: markers.length, optimal };
}

    <button class="fbtn" data-f="optimal" onclick="setFilter(this)">Optimal</button>
  </div>`;

groupOrder.forEach(gName => {
  const g = groups[gName]; if (!g) return;
  const gFlag = g.filter(b => b.within_normal === 'FALSE').length;
  out += `<div class="grp" data-group="${esc(gName)}" id="grp-${slug(gName)}">
    <div class="grp-h" onclick="toggleGrp(this.parentElement)">
      <span class="grp-name">${esc(gName)}</span>
      <span class="grp-meta">${g.length} markers ${gFlag?`<span class="grp-flag">${gFlag} flagged</span>`:''}
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
    </div>
    <div class="grp-body">`;
  g.forEach(b => { out += bioCard(b); });
  out += `</div></div>`;
});
out += `</section>`;

// ---------- FOOTER ----------
out += `<footer class="foot">
  <img class="foot-logo inv" src="https://cdn.prod.website-files.com/6825a8869d9afdbdbc4d8881/68500823ebf7f5e6d4b298f9_Copy%20of%20TrueVitals%20Inverse.png" alt="TrueVitals">
  <img class="foot-logo std" src="https://cdn.prod.website-files.com/6825a8869d9afdbdbc4d8881/68500811c613b28045a91878_Copy%20of%20TrueVitals%20(1).png" alt="TrueVitals">
  <p>Report generated ${esc(data.report_date || '')} · TrueVitals Group Ltd · Company No. 16449605</p>
  <p>This report is for informational purposes only and does not constitute medical advice.</p>
  <p style="margin-top:16px;margin-bottom:12px"><a href="https://www.trustpilot.com/evaluate/truevitals.co.uk" style="color:var(--green);text-decoration:none;font-weight:600;font-size:13px">Found this report helpful? Leave us a review on Trustpilot</a></p>
  <p><a href="https://www.truevitals.co.uk">truevitals.co.uk</a></p>
</footer>`;

app.innerHTML = out;

// ============================================================
//  COMPONENT BUILDERS
// ============================================================
function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }

function rangeBar(b, big){
  const rp = num(b.result_position); if (rp == null) return '';
  const lnp = num(b.lower_normal_position), unp = num(b.upper_normal_position);
  if (lnp == null && unp == null) return '';
  const lo = num(b.lower_optimal_position), uo = num(b.upper_optimal_position);
  const st = statusOf(b);
  const dotc = st==='flag'?'red':st==='optimal'?'green':'amber';
  const L = (lnp==null?0:lnp)*100, U=(unp==null?1:unp)*100;
  const oL = (lo==null?L/100:lo)*100, oU=(uo==null?U/100:uo)*100;
  const pos = Math.max(2, Math.min(98, rp*100));
  return `<div class="rbar-wrap ${big?'rbar-big':''}">
    <div class="rbar">
      <div class="rbar-normal" style="left:${L}%;width:${Math.max(0,U-L)}%"></div>
      <div class="rbar-opt" style="left:${oL}%;width:${Math.max(0,oU-oL)}%"></div>
      <div class="rbar-dot dot-${dotc}" style="--x:${pos}%" data-x="${pos}"></div>
    </div>
  </div>`;
}

function bioCard(b){
  const st = statusOf(b);
  const col = st==='flag'?'red':st==='optimal'?'green':st==='qual'?'blue':'amber';
  const badge = st==='flag'?'Outside range':st==='optimal'?'Optimal':st==='qual'?esc(b.result||'—'):'In range';
  const bar = rangeBar(b, false);
  // detail
  let detail = '';
  if (b.description){
    const parts = (b.description||'').split(/(?<=\.)\s/);
    const head = parts.shift(); const rest = parts.join(' ');
    detail += `<p class="bc-desc"><strong>${esc(head)}</strong>${rest?' '+esc(rest):''}</p>`;
  }
  const ranges = [];
  if (b.lower_optimal!=='') ranges.push(`<span><em>Optimal low</em>${esc(b.lower_optimal)}</span>`);
  if (b.upper_optimal!=='') ranges.push(`<span><em>Optimal high</em>${esc(b.upper_optimal)}</span>`);
  if (b.lower_normal!=='') ranges.push(`<span><em>Normal low</em>${esc(b.lower_normal)}</span>`);
  if (b.upper_normal!=='') ranges.push(`<span><em>Normal high</em>${esc(b.upper_normal)}</span>`);
  if (ranges.length) detail += `<div class="bc-ranges">${ranges.join('')}</div>`;
  if (b.low_causes || b.high_causes){
    detail += `<div class="bc-causes">`;
    if (b.low_causes) detail += `<p><em>If low</em> ${esc(b.low_causes)}</p>`;
    if (b.high_causes) detail += `<p><em>If high</em> ${esc(b.high_causes)}</p>`;
    detail += `</div>`;
  }
  return `<div class="bc bc-${col}" data-status="${st}" data-name="${esc((b.name||'').toLowerCase())}">
    <div class="bc-main" onclick="toggleCard(this.parentElement)">
      <span class="bc-tick tick-${col}"></span>
      <div class="bc-info"><div class="bc-name">${esc(b.name)}</div><div class="bc-res">${esc(b.result)} ${esc(b.units||'')}</div></div>
      ${bar}
      <span class="chip chip-${st}">${badge}</span>
      <svg class="bc-chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="bc-detail"><div class="bc-detail-in">${detail||'<p class="bc-desc">No additional detail for this marker.</p>'}</div></div>
  </div>`;
}

// ============================================================
//  INTERACTIONS
// ============================================================
function toggleGrp(el){ el.classList.toggle('open'); animateBarsIn(el); }
function toggleCard(el){
  const open = el.classList.toggle('open');
  const d = el.querySelector('.bc-detail');
  d.style.maxHeight = open ? d.firstElementChild.scrollHeight + 24 + 'px' : '0px';
}
function goTo(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }

function pickSystem(sysId){
  const sys = SYSTEMS.find(s=>s.id===sysId); if(!sys) return;
  // open matching groups, close others, scroll to first
  document.querySelectorAll('.grp').forEach(g=>{
    const on = sys.groups.includes(g.dataset.group);
    g.classList.toggle('open', on);
    if(on) animateBarsIn(g);
  });
  const first = sys.groups.map(g=>document.getElementById('grp-'+slug(g))).find(Boolean);
  if(first){
    // reset filters so the group is visible
    document.getElementById('search').value=''; setActiveFilter('all'); applyFilter();
    setTimeout(()=>first.scrollIntoView({behavior:'smooth',block:'start'}),60);
    first.classList.add('grp-flash'); setTimeout(()=>first.classList.remove('grp-flash'),1200);
  }
}

// tooltip for body map
const tipEl = document.createElement('div'); tipEl.className='bodytip'; document.body.appendChild(tipEl);
function tip(e,sysId){
  const sys=SYSTEMS.find(s=>s.id===sysId); const st=sys&&sys._st; if(!st) return;
  tipEl.innerHTML = `<strong>${esc(sys.label)}</strong>${st.optimal} of ${st.total} optimal${st.flagged?` · <span class="tip-red">${st.flagged} flagged</span>`:''}`;
  tipEl.classList.add('show'); tipMove(e);
}
function tipMove(e){ const t=(e&&e.touches&&e.touches[0])||e; if(!t||t.clientX==null){ tipHide(); return; } tipEl.style.left=t.clientX+'px'; tipEl.style.top=(t.clientY-14)+'px'; }
function tipHide(){ tipEl.classList.remove('show'); }

// filters
function setFilter(btn){ document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyFilter(); }
function setActiveFilter(f){ document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active', b.dataset.f===f)); }
function applyFilter(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const f=document.querySelector('.fbtn.active').dataset.f;
  document.querySelectorAll('.bc').forEach(c=>{
    let show=true;
    if(q && !c.dataset.name.includes(q)) show=false;
    if(f==='flag' && c.dataset.status!=='flag') show=false;
    if(f==='optimal' && c.dataset.status!=='optimal') show=false;
    c.style.display=show?'':'none';
  });
  document.querySelectorAll('.grp').forEach(g=>{
    const vis=[...g.querySelectorAll('.bc')].some(c=>c.style.display!=='none');
    g.style.display=vis?'':'none';
    if((q||f!=='all')&&vis) g.classList.add('open');
  });
}
window.setFilter=setFilter; window.applyFilter=applyFilter;

// range bar fill on reveal
function animateBarsIn(scope){
  (scope||document).querySelectorAll('.rbar-dot:not(.lit)').forEach(d=>{
    d.classList.add('lit'); requestAnimationFrame(()=>{ d.style.left=d.dataset.x+'%'; });
  });
}

// theme toggle
function toggleTheme(){
  const b=document.body; const light=b.getAttribute('data-theme')==='light';
  b.setAttribute('data-theme', light?'dark':'light');
  document.getElementById('themeLabel').textContent = light?'Light':'Dark';
}
window.toggleTheme=toggleTheme;

// print
function printReport(){
  document.querySelectorAll('.grp,.bc').forEach(el=>el.classList.add('open'));
  document.querySelectorAll('.bc-detail').forEach(d=>{ d.style.maxHeight='none'; });
  window.print();
}
window.printReport=printReport;

// scroll reveal + active nav
const revObs=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); }),{threshold:0.08});
document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));

const navSections=['overview','body','findings','flags','results'];
const navObs=new IntersectionObserver(es=>{
  es.forEach(e=>{ if(e.isIntersecting){
    document.querySelectorAll('.nav-links a,.mnav a').forEach(a=>a.classList.toggle('active', a.dataset.t===e.target.id));
  }});
},{rootMargin:'-45% 0px -50% 0px'});
navSections.forEach(id=>{ const el=document.getElementById(id); if(el) navObs.observe(el); });

// ============================================================
//  GATE + LAUNCH ANIMATION
// ============================================================
function runIntro(){
  // ring count-up
  const R=94, C=2*Math.PI*R; const fill=document.getElementById('ringFill');
  const R2=72, C2=2*Math.PI*R2; const fill2=document.getElementById('ringFill2');
  fill.style.strokeDasharray=C; fill.style.strokeDashoffset=C;
  fill2.style.strokeDasharray=C2; fill2.style.strokeDashoffset=C2;
  const optFrac=assessable.length?optimalCount/assessable.length:0;
  const flagFrac=totalTested?flaggedCount/totalTested:0;
  const t0=performance.now(), dur=1400;
  const pctEl=document.getElementById('ringPct');
  function step(t){
    const k=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-k,3);
    fill.style.strokeDashoffset=C*(1-optFrac*e);
    fill2.style.strokeDashoffset=C2*(1-flagFrac*e);
    pctEl.innerHTML=Math.round(healthPct*e)+'<span>%</span>';
    if(k<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  // scan sweep + node pop
  const scan=document.getElementById('scan'); if(scan) scan.classList.add('run');
  document.querySelectorAll('.node').forEach((n,i)=>{ setTimeout(()=>n.classList.add('on'), 300+i*70); });
  // first-visible bars
  setTimeout(()=>animateBarsIn(document), 200);
}

const dob=document.getElementById('gate-dob');
const gerr=document.getElementById('gate-error');
dob.addEventListener('input',function(){
  let v=this.value.replace(/[^\d]/g,'').slice(0,8), f='';
  if(v.length>0)f=v.slice(0,2); if(v.length>2)f+=' / '+v.slice(2,4); if(v.length>4)f+=' / '+v.slice(4);
  this.value=f;
});
dob.addEventListener('keydown',e=>{ if(e.key==='Enter') verifyDob(); });
function verifyDob(){
  const norm=d=>{ let c=String(d).replace(/\s/g,''); if(/^\d{4}-\d{2}-\d{2}/.test(c)){ const p=c.split(/[-T]/); return p[2]+'/'+p[1]+'/'+p[0]; } return c; };
  if(norm(dob.value)===norm(data.dob)){
    document.getElementById('gate').classList.add('gate-out');
    setTimeout(()=>{ document.getElementById('gate').style.display='none'; },550);
    document.getElementById('app-nav').classList.remove('hide');
    document.getElementById('app-mnav').classList.remove('hide');
    app.classList.remove('hide');
    document.body.classList.add('unlocked');
    runIntro();
  } else {
    gerr.style.display='block'; dob.classList.add('shake');
    setTimeout(()=>dob.classList.remove('shake'),500);
  }
}
window.verifyDob=verifyDob;
dob.focus();

// print header fill
try{ document.getElementById('print-meta').innerHTML = (REPORT_DATA.patient_name||'')+'<br>Report date: '+(REPORT_DATA.report_date||'')+'<br>For informational purposes only'; }catch(e){}
</script>
